{% extends 'base.html' %}
{% block title %}{{ t_both('Đổi mật khẩu') }} — {{ site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15) !important;">
            <div class="card-header border-0 py-3 text-white text-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <h5 class="mb-0 text-white fw-bold"><i class="bi bi-key me-2"></i>{{ t('Đổi mật khẩu mới') }}</h5>
            </div>
            <div class="card-body p-4" style="background: linear-gradient(to bottom, #ffffff 0%, #fafbff 100%);">
                <form method="POST">
                     
                    <div class="mb-3">
                        <label class="form-label text-dark"><i class="bi bi-lock me-1"></i>{{ t('Mật khẩu hiện tại') }}</label>
                        <input type="password" name="current_password" class="form-control" placeholder="{{ t('Nhập mật khẩu hiện tại của bạn') }}" autocomplete="current-password">
                        <div class="form-text small" style="color: #6c757d; font-size: 0.78rem;">{{ t('Bỏ qua trường này nếu bạn đăng nhập Google và đang thiết lập mật khẩu thủ công lần đầu.') }}</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-dark"><i class="bi bi-key me-1"></i>{{ t('Mật khẩu mới') }}</label>
                        <input type="password" name="new_password" class="form-control" placeholder="{{ t('Nhập mật khẩu mới') }}" required autocomplete="new-password">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-dark"><i class="bi bi-key-fill me-1"></i>{{ t('Xác nhận mật khẩu mới') }}</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="{{ t('Xác nhận lại mật khẩu mới') }}" required autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-check2-circle me-1"></i>{{ t('Cập nhật mật khẩu') }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
